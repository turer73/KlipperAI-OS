[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "klipperos-ai"
version = "1.0.0"
description = "AI-powered Klipper 3D printer Linux distribution tools"
readme = "README.md"
license = {text = "GPL-3.0"}
requires-python = ">=3.9"
authors = [
    {name = "Zaman Huseyinli"},
]

dependencies = [
    "requests>=2.28",
    "numpy>=1.21",
    "Pillow>=9.0",
]

[project.optional-dependencies]
ai = [
    "tflite-runtime>=2.11",
    "opencv-python-headless>=4.5",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
]

[project.scripts]
kos-profile = "tools.kos_profile:main"
kos-update = "tools.kos_update:main"
kos-backup = "tools.kos_backup:main"
kos-mcu = "tools.kos_mcu:main"
kos-plr = "tools.kos_plr:main"
kos-rewind = "tools.kos_rewind:main"
kos-calibrate = "tools.kos_calibrate:main"

[tool.setuptools.packages.find]
include = ["tools*", "ai_monitor*"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
