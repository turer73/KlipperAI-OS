# ═══════════════════════════════════════════════
# KlipperOS-AI Docker Compose
# ═══════════════════════════════════════════════
#
# Kullanim:
#   docker compose up -d          # Tum servisleri baslat
#   docker compose up -d kos-api  # Sadece API
#   docker compose logs -f        # Loglari izle
#   docker compose down           # Durdur
#
# Profiller:
#   docker compose --profile full up -d     # Nginx dahil
#   docker compose --profile dev up -d      # Dev modu
#
# NOT: Klipper, Moonraker ve KlipperScreen host'ta calisir.
#      Docker sadece API + Dashboard + Nginx katmanini yonetir.
# ═══════════════════════════════════════════════

name: klipperos-ai

services:
  # ── FastAPI Backend ─────────────────────────
  kos-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: kos-api
    restart: unless-stopped
    ports:
      - "8470:8470"
    volumes:
      # Kalici veriler: DB, JWT secret, bildirim config
      - kos-data:/var/lib/klipperos-ai
      # AI modelleri (host'tan mount)
      - ${KOS_MODELS_DIR:-./ai-monitor/models}:/app/ai-monitor/models:ro
      # Konfigurasyonlar
      - kos-config:/etc/klipperos-ai
    environment:
      - KOS_MOONRAKER_URL=${KOS_MOONRAKER_URL:-http://host.docker.internal:7125}
      - KOS_JWT_SECRET=${KOS_JWT_SECRET:-}
      - KOS_DB_PATH=/var/lib/klipperos-ai/kos.db
    extra_hosts:
      # Linux'ta host.docker.internal destegi
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8470/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - kos-net

  # ── Next.js Dashboard ──────────────────────
  kos-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: kos-dashboard
    restart: unless-stopped
    ports:
      - "3470:3470"
    environment:
      - NODE_ENV=production
      - API_BACKEND_URL=http://kos-api:8470
    depends_on:
      kos-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3470/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - kos-net

  # ── Nginx Reverse Proxy (full profil) ──────
  nginx:
    image: nginx:alpine
    container_name: kos-nginx
    restart: unless-stopped
    profiles:
      - full
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      kos-api:
        condition: service_healthy
      kos-dashboard:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - kos-net

  # ── Dev modu: hot-reload ile ───────────────
  kos-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: kos-api-dev
    profiles:
      - dev
    ports:
      - "8470:8470"
    volumes:
      - kos-data:/var/lib/klipperos-ai
      - kos-config:/etc/klipperos-ai
      # Kaynak kodu mount — hot reload
      - ./packages/api:/app/packages/api
      - ./ai-monitor:/app/ai-monitor
      - ./tools:/app/tools
    environment:
      - KOS_MOONRAKER_URL=${KOS_MOONRAKER_URL:-http://host.docker.internal:7125}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["uvicorn", "packages.api.main:app", "--host", "0.0.0.0", "--port", "8470", "--reload"]
    networks:
      - kos-net

volumes:
  kos-data:
    driver: local
  kos-config:
    driver: local

networks:
  kos-net:
    driver: bridge
