<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KlipperOS-AI Chat</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-chat: #0f3460;
    --bg-user: #1a5276;
    --bg-ai: #2c3e50;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --text-primary: #eee;
    --text-secondary: #aab;
    --border: #2a2a4a;
    --input-bg: #16213e;
    --shadow: rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), #ff6b81);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .status {
    font-size: 12px;
    color: var(--text-secondary);
    padding: 3px 8px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
  }
  .header .status.online { color: #2ecc71; }
  .header .status.offline { color: var(--accent); }
  .header .status.rag { color: #3498db; font-weight: 600; }

  .header-right { display: flex; align-items: center; gap: 8px; }
  .model-select {
    background: var(--input-bg);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .model-select:focus { border-color: var(--accent); }
  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .btn-icon:hover {
    color: var(--text-primary);
    border-color: var(--accent);
    background: rgba(233,69,96,0.1);
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  /* Messages */
  .message {
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user { align-items: flex-end; }
  .message.ai { align-items: flex-start; }

  .msg-role {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    padding: 0 4px;
    font-weight: 500;
  }
  .msg-bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 14px;
    word-wrap: break-word;
    white-space: pre-wrap;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .message.user .msg-bubble {
    background: var(--bg-user);
    border-bottom-right-radius: 4px;
  }
  .message.ai .msg-bubble {
    background: var(--bg-ai);
    border-bottom-left-radius: 4px;
  }
  .msg-bubble code {
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }
  .msg-bubble pre {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }

  /* Thinking indicator */
  .thinking {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--text-secondary);
    font-style: italic;
    font-size: 13px;
  }
  .thinking .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.4s infinite ease-in-out;
  }
  .thinking .dot:nth-child(1) { animation-delay: 0s; }
  .thinking .dot:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* Welcome message */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
  }
  .welcome h2 {
    font-size: 22px;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .welcome p { font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }
  .welcome .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }
  .welcome .chip {
    background: rgba(233,69,96,0.15);
    border: 1px solid rgba(233,69,96,0.3);
    color: var(--accent-hover);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .welcome .chip:hover {
    background: rgba(233,69,96,0.25);
    border-color: var(--accent);
  }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .input-wrapper {
    flex: 1;
    position: relative;
  }
  #chatInput {
    width: 100%;
    background: var(--input-bg);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  #chatInput:focus { border-color: var(--accent); }
  #chatInput::placeholder { color: var(--text-secondary); }

  .btn-send {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    width: 48px;
    height: 48px;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
  .btn-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .input-info {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 6px;
    padding: 0 4px;
  }

  /* Back to Mainsail link */
  .back-link {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text-primary); }

  /* Mobile responsive */
  @media (max-width: 600px) {
    .header { padding: 8px 12px; }
    .header h1 { font-size: 15px; }
    .chat-area { padding: 12px; }
    .msg-bubble { max-width: 90%; font-size: 14px; }
    .model-select { max-width: 120px; font-size: 12px; }
    .welcome .chips { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <a href="/" class="back-link">&#8592; Mainsail</a>
    <h1>KlipperOS-AI Chat</h1>
    <span id="statusBadge" class="status offline">Baglaniyor...</span>
    <span id="ragBadge" class="status" style="display:none">RAG</span>
  </div>
  <div class="header-right">
    <select id="modelSelect" class="model-select">
      <option value="qwen3:1.7b">qwen3:1.7b</option>
    </select>
    <button class="btn-icon" onclick="clearChat()" title="Sohbeti temizle">&#128465;</button>
  </div>
</div>

<!-- Chat Area -->
<div id="chatArea" class="chat-area">
  <div class="welcome" id="welcomeMsg">
    <h2>Merhaba! &#128075;</h2>
    <p>Ben KlipperOS-AI asistaniyim. 3D yazici, Klipper ayarlari ve baski sorunlari hakkinda sorularinizi yanitlayabilirim.</p>
    <div class="chips">
      <div class="chip" onclick="sendQuick('PLA icin ideal baski sicakliklari nedir?')">PLA Sicakliklari</div>
      <div class="chip" onclick="sendQuick('Klipper pressure advance nasil ayarlanir?')">Pressure Advance</div>
      <div class="chip" onclick="sendQuick('Ilk katman yapismiyor, ne yapmaliyim?')">Ilk Katman Sorunu</div>
      <div class="chip" onclick="sendQuick('Input shaper kalibrasyonu nasil yapilir?')">Input Shaper</div>
    </div>
  </div>
</div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-row">
    <div class="input-wrapper">
      <textarea id="chatInput" rows="1" placeholder="Mesajinizi yazin..." onkeydown="handleKey(event)"></textarea>
    </div>
    <button id="sendBtn" class="btn-send" onclick="sendMessage()">&#9654;</button>
  </div>
  <div class="input-info">
    <span id="modelInfo">Model: qwen3:1.7b</span>
    <span id="tokenInfo"></span>
  </div>
</div>

<script>
// --- Configuration ---
const API_BASE = window.location.origin + '/ai-chat';

let messages = [];
let isGenerating = false;
let currentController = null;

// --- DOM refs ---
const chatArea = document.getElementById('chatArea');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const modelSelect = document.getElementById('modelSelect');
const statusBadge = document.getElementById('statusBadge');
const ragBadge = document.getElementById('ragBadge');
const modelInfo = document.getElementById('modelInfo');
const tokenInfo = document.getElementById('tokenInfo');
const welcomeMsg = document.getElementById('welcomeMsg');

// --- Init ---
window.addEventListener('DOMContentLoaded', () => {
  checkStatus();
  chatInput.focus();
  autoResizeInput();
});

// --- Check system status + fetch models ---
async function checkStatus() {
  try {
    // Durum ve modelleri paralel cek
    const [statusResp, modelsResp] = await Promise.all([
      fetch(API_BASE + '/api/status'),
      fetch(API_BASE + '/api/models')
    ]);

    if (!statusResp.ok || !modelsResp.ok) throw new Error('API erisilemedi');

    const status = await statusResp.json();
    const modelsData = await modelsResp.json();

    // Modelleri doldur
    const models = modelsData.models || [];
    const activeModel = modelsData.active || 'qwen3:1.7b';
    modelSelect.innerHTML = '';
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      modelSelect.appendChild(opt);
    });
    if (models.includes(activeModel)) {
      modelSelect.value = activeModel;
    }

    // Durum badge
    if (status.ollama) {
      statusBadge.textContent = 'Cevrimici';
      statusBadge.className = 'status online';
    } else {
      statusBadge.textContent = 'Ollama kapalI';
      statusBadge.className = 'status offline';
    }

    // RAG badge
    if (status.rag && status.rag.available) {
      ragBadge.textContent = 'RAG Aktif';
      ragBadge.className = 'status rag';
      ragBadge.style.display = 'inline';
    }

    modelInfo.textContent = 'Model: ' + modelSelect.value;
  } catch (e) {
    statusBadge.textContent = 'Cevrimdisi';
    statusBadge.className = 'status offline';
    console.error('AI Chat API baglanti hatasi:', e);
  }
}

modelSelect.addEventListener('change', () => {
  modelInfo.textContent = 'Model: ' + modelSelect.value;
});

// --- Auto-resize textarea ---
function autoResizeInput() {
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  });
}

// --- Handle Enter key ---
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// --- Quick send from chip ---
function sendQuick(text) {
  chatInput.value = text;
  sendMessage();
}

// --- Add message bubble ---
function addBubble(text, role) {
  if (welcomeMsg) welcomeMsg.remove();

  const msgDiv = document.createElement('div');
  msgDiv.className = 'message ' + role;

  const roleLabel = document.createElement('div');
  roleLabel.className = 'msg-role';
  roleLabel.textContent = role === 'user' ? 'Siz' : 'AI Asistan';
  msgDiv.appendChild(roleLabel);

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  msgDiv.appendChild(bubble);

  chatArea.appendChild(msgDiv);
  scrollToBottom();
  return bubble;
}

// --- Add thinking indicator ---
function addThinking() {
  if (welcomeMsg) welcomeMsg.remove();

  const msgDiv = document.createElement('div');
  msgDiv.className = 'message ai';
  msgDiv.id = 'thinkingMsg';

  const roleLabel = document.createElement('div');
  roleLabel.className = 'msg-role';
  roleLabel.textContent = 'AI Asistan';
  msgDiv.appendChild(roleLabel);

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const thinking = document.createElement('span');
  thinking.className = 'thinking';
  thinking.innerHTML = 'Dusunuyor <span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  bubble.appendChild(thinking);
  msgDiv.appendChild(bubble);

  chatArea.appendChild(msgDiv);
  scrollToBottom();
  return msgDiv;
}

// --- Scroll to bottom ---
function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// --- Format response text (basic markdown) ---
function formatResponse(text) {
  // Convert code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Convert inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Convert bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Convert italic
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return text;
}

// --- Send message ---
async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || isGenerating) return;

  // UI state
  isGenerating = true;
  sendBtn.disabled = true;
  chatInput.value = '';
  chatInput.style.height = 'auto';

  // User bubble
  addBubble(text, 'user');
  messages.push({ role: 'user', content: text });

  // Thinking indicator
  const thinkingEl = addThinking();

  // Prepare request — server handles system prompt + RAG context
  const payload = {
    messages: messages.slice(-10)
  };

  let responseText = '';
  let aiBubble = null;

  try {
    currentController = new AbortController();
    const resp = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: currentController.signal
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

    // Remove thinking indicator, create AI bubble
    thinkingEl.remove();
    aiBubble = addBubble('', 'ai');

    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });

      // SSE format: "data: {...}\n\n"
      const parts = buffer.split('\n\n');
      buffer = parts.pop(); // son kisim tamamlanmamis olabilir

      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data: ')) continue;

        const payload = line.slice(6); // "data: " kismini kaldir

        // Stream bitis sinyali
        if (payload === '[DONE]') continue;

        try {
          const data = JSON.parse(payload);

          if (data.error) {
            responseText += '\n[Hata: ' + data.error + ']';
          } else if (data.token) {
            responseText += data.token;
          }

          // Update bubble with formatted text
          aiBubble.innerHTML = formatResponse(responseText.trim());
          scrollToBottom();
        } catch (e) { /* skip malformed SSE */ }
      }
    }

    // Save to history
    if (responseText.trim()) {
      messages.push({ role: 'assistant', content: responseText });
    }

  } catch (e) {
    thinkingEl.remove();
    if (e.name !== 'AbortError') {
      const errorBubble = addBubble('Hata: ' + e.message + '\n\nAI Chat servisi calismiyor olabilir.', 'ai');
      errorBubble.style.borderLeft = '3px solid ' + getComputedStyle(document.documentElement).getPropertyValue('--accent');
    }
  } finally {
    isGenerating = false;
    sendBtn.disabled = false;
    currentController = null;
    chatInput.focus();
    modelInfo.textContent = 'Model: ' + modelSelect.value + ' | Hazir';
  }
}

// --- Clear chat ---
function clearChat() {
  if (isGenerating && currentController) {
    currentController.abort();
  }
  messages = [];
  chatArea.innerHTML = '';
  tokenInfo.textContent = '';
  modelInfo.textContent = 'Model: ' + modelSelect.value;

  // Re-add welcome
  const welcome = document.createElement('div');
  welcome.className = 'welcome';
  welcome.id = 'welcomeMsg';
  welcome.innerHTML = `
    <h2>Merhaba! &#128075;</h2>
    <p>Ben KlipperOS-AI asistaniyim. 3D yazici, Klipper ayarlari ve baski sorunlari hakkinda sorularinizi yanitlayabilirim.</p>
    <div class="chips">
      <div class="chip" onclick="sendQuick('PLA icin ideal baski sicakliklari nedir?')">PLA Sicakliklari</div>
      <div class="chip" onclick="sendQuick('Klipper pressure advance nasil ayarlanir?')">Pressure Advance</div>
      <div class="chip" onclick="sendQuick('Ilk katman yapismiyor, ne yapmaliyim?')">Ilk Katman Sorunu</div>
      <div class="chip" onclick="sendQuick('Input shaper kalibrasyonu nasil yapilir?')">Input Shaper</div>
    </div>
  `;
  chatArea.appendChild(welcome);
  chatInput.focus();
}
</script>

</body>
</html>
