# =============================================================================
# KlipperAI-OS — Image Build & Release Workflow
# =============================================================================
# Ubuntu Server 24.04 ISO'sunu yeniden paketleyerek bootable x86 kurulum
# ISO'su uretir ve GitHub Releases'da yayinlar.
#
# Yontem: Ubuntu Server ISO + autoinstall + KlipperOS-AI dosyalari
#
# Not: ISO ~3 GB oldugu icin GitHub Release 2 GB limitini asmak uzere
# dosya 1.9 GB'lik parcalara bolunur (split).
#
# Tetikleme:
#   - Manuel: Actions sekmesinden "Run workflow" ile
#   - Tag push: v* formatinda tag push edildiginde (ornek: v2.1.0)
# =============================================================================

name: Build KlipperAI-OS Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ornek: 2.1.0)'
        required: false
        default: ''
      create_release:
        description: 'GitHub Release olustur?'
        required: false
        type: boolean
        default: true

  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  IMAGE_BASE_NAME: klipperai-os-x86

jobs:
  build:
    name: Build ISO Image
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      # ----- Checkout -----
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----- Version belirleme -----
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep -oP '^VERSION="\K[^"]+' image-builder/build-image.sh || echo "2.1.0")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_BASE_NAME}-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Building KlipperAI-OS v${VERSION}"

      # ----- Bagimliliklari kur -----
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso \
            wget \
            p7zip-full

      # ----- Build script'te versiyonu guncelle -----
      - name: Update version in build script
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^VERSION=.*/VERSION=\"${VERSION}\"/" image-builder/build-image.sh

      # ----- Ubuntu Server ISO'sunu cache'le -----
      - name: Cache Ubuntu Server ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: image-builder/build/ubuntu-*.iso
          key: ubuntu-server-24.04.2-amd64

      # ----- Imaj olustur -----
      - name: Build ISO image
        run: |
          cd image-builder
          sudo -E bash build-image.sh
          # Build root olarak calisti — dosya izinlerini duzelt
          sudo chown -R runner:runner . || true
        env:
          DEBIAN_FRONTEND: noninteractive
          SKIP_SHA_CHECK: ${{ steps.cache-iso.outputs.cache-hit == 'true' && '1' || '0' }}

      # ----- Imaj bilgilerini topla -----
      - name: Collect image info
        id: image_info
        run: |
          IMAGE_NAME="${{ steps.version.outputs.image_name }}"

          # --- Orijinal ISO/IMG dosyasini bul ---
          IMG_PATH="image-builder/${IMAGE_NAME}.img"
          if [ ! -f "$IMG_PATH" ]; then
            ISO_PATH="image-builder/${IMAGE_NAME}.iso"
            if [ -f "$ISO_PATH" ]; then
              cp "$ISO_PATH" "$IMG_PATH"
            else
              FOUND=$(find image-builder/ -maxdepth 1 \( -name "*.iso" -o -name "*.img" \) \
                -not -name "*.sha256" -not -name "*.part*" 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                cp "$FOUND" "$IMG_PATH"
              else
                echo "::error::Image file not found!"
                ls -la image-builder/
                exit 1
              fi
            fi
          fi

          FILE_SIZE=$(du -h "$IMG_PATH" | cut -f1)
          FILE_SIZE_BYTES=$(stat --printf="%s" "$IMG_PATH")
          SHA256=$(sha256sum "$IMG_PATH" | cut -d' ' -f1)

          echo "image_path=${IMG_PATH}" >> "$GITHUB_OUTPUT"
          echo "file_size=${FILE_SIZE}" >> "$GITHUB_OUTPUT"
          echo "file_size_bytes=${FILE_SIZE_BYTES}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

          # SHA256 checksum dosyasi
          echo "${SHA256}  ${IMAGE_NAME}.img" > "${IMG_PATH}.sha256"

          # --- Parcalari kontrol et / olustur (2 GB limit) ---
          MAX_SIZE=$((2000 * 1024 * 1024))  # ~2 GB
          PART_PREFIX="image-builder/${IMAGE_NAME}.img.part"
          PART_COUNT=$(ls -1 "${PART_PREFIX}"* 2>/dev/null | wc -l)

          if [ "$PART_COUNT" -eq 0 ] && [ "$FILE_SIZE_BYTES" -gt "$MAX_SIZE" ]; then
            echo "::notice::Splitting ${FILE_SIZE} image into parts..."
            split -b 1900m "$IMG_PATH" "${PART_PREFIX}"
            PART_COUNT=$(ls -1 "${PART_PREFIX}"* 2>/dev/null | wc -l)
          fi

          if [ "$PART_COUNT" -gt 0 ]; then
            echo "split=true" >> "$GITHUB_OUTPUT"
            echo "part_count=${PART_COUNT}" >> "$GITHUB_OUTPUT"
            # Part bilgilerini listele
            for part in "${PART_PREFIX}"*; do
              echo "::notice::Part: $(basename "$part") — $(du -h "$part" | cut -f1)"
            done
          else
            echo "split=false" >> "$GITHUB_OUTPUT"
            echo "part_count=0" >> "$GITHUB_OUTPUT"
          fi

          echo "::notice::Image: ${FILE_SIZE}, SHA256: ${SHA256}, Parts: ${PART_COUNT}"

      # ----- Artifact olarak yukle (her zaman) -----
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.image_name }}
          path: |
            image-builder/${{ steps.version.outputs.image_name }}.img.part*
            image-builder/${{ steps.version.outputs.image_name }}.img.sha256
          retention-days: 14
          compression-level: 0
          if-no-files-found: error

      # ----- GitHub Release olustur -----
      - name: Create GitHub Release
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: KlipperAI-OS v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## KlipperAI-OS v${{ steps.version.outputs.version }}

            3D yazicilar icin Klipper + Moonraker + Mainsail + AI destekli komple isletim sistemi.
            Ubuntu Server 24.04 LTS tabanli.

            ### 📥 Indirme

            Dosya ${{ steps.image_info.outputs.part_count }} parcaya bolunmustur (GitHub 2 GB limiti).

            | Dosya | Toplam Boyut | SHA256 |
            |-------|-------------|--------|
            | `${{ steps.version.outputs.image_name }}.img` | ${{ steps.image_info.outputs.file_size }} | `${{ steps.image_info.outputs.sha256 }}` |

            ### 🔧 Kurulum

            **1. Parcalari indir ve birlestir:**
            ```bash
            # Tum .part* dosyalarini indirdikten sonra:
            cat ${{ steps.version.outputs.image_name }}.img.part* > ${{ steps.version.outputs.image_name }}.img

            # Dogrulama
            sha256sum -c ${{ steps.version.outputs.image_name }}.img.sha256
            ```

            **2. USB'ye yaz:**
            ```bash
            # Linux / macOS
            sudo dd if=${{ steps.version.outputs.image_name }}.img of=/dev/sdX bs=4M status=progress

            # Windows: Balena Etcher veya Rufus kullanin
            ```

            **3. Ilk acilis:**
            1. USB'den boot edin
            2. Ubuntu autoinstall otomatik tamamlanir (~5 dk)
            3. Yeniden baslatma sonrasi First Boot Wizard baslar
            4. Donanim algilama → Profil secimi → Ag → Yazilim kurulumu
            5. Profiller: **LIGHT** (512MB RAM) | **STANDARD** (2GB+) | **FULL** (4GB+)

            ### 📦 Icerik
            - Klipper + Moonraker + Mainsail (web UI)
            - KlipperScreen (dokunmatik ekran)
            - Crowsnest (kamera streaming)
            - AI Print Monitor (yapay zeka baski izleme)
            - Input Shaping Assistant
            - FlowGuard filament sensoru
            - Otomatik donanim algilama ve profil onerisi
          files: |
            image-builder/${{ steps.version.outputs.image_name }}.img.part*
            image-builder/${{ steps.version.outputs.image_name }}.img.sha256

      # ----- Build ozeti -----
      - name: Build summary
        if: always()
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.version.outputs.image_name }}.img\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Method | Ubuntu Server 24.04 ISO repackaging |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.image_info.outputs.file_size }}" ]; then
            echo "| Size | ${{ steps.image_info.outputs.file_size }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Parts | ${{ steps.image_info.outputs.part_count }} |" >> $GITHUB_STEP_SUMMARY
            echo "| SHA256 | \`${{ steps.image_info.outputs.sha256 }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | ${{ runner.os }} ${{ runner.arch }} |" >> $GITHUB_STEP_SUMMARY
