# =============================================================================
# KlipperOS-AI — KlipperScreen Config Template
# =============================================================================

[main]
# Dil
language: tr

# Tema
theme: colorized

# Isitici guc gosterimi
show_heater_power: True

# Hareket hizlari (mm/s)
move_speed_xy: 80
move_speed_z: 10

# Ekran kapatma suresi (saniye, 0 = devre disi)
screen_blanking: 300

# Fare imleci goster
show_cursor: True

# Onay dialogu
confirm_estop: True

# --- Yazici 1 ---
[printer KlipperOS-AI]
moonraker_host: 127.0.0.1
moonraker_port: 7125

# --- Yazici 2 (FULL profil icin, aciklamayi kaldir) ---
#[printer Yazici-2]
#moonraker_host: 127.0.0.1
#moonraker_port: 7126

# --- Yazici 3 (FULL profil icin, aciklamayi kaldir) ---
#[printer Yazici-3]
#moonraker_host: 127.0.0.1
#moonraker_port: 7127

# --- Preheat Profilleri ---
[preheat PLA]
extruder: 200
heater_bed: 60

[preheat PETG]
extruder: 235
heater_bed: 80

[preheat ABS]
extruder: 245
heater_bed: 100

[preheat TPU]
extruder: 220
heater_bed: 50

# --- KlipperOS-AI Ozel Menu ---
[menu __main custom]
name: KlipperOS-AI
icon: info

[menu __main custom flowguard]
name: FlowGuard Durumu
icon: info
method: printer.gcode.script
params: {"script":"KOS_FLOWGUARD_STATUS"}

[menu __main custom plr_resume]
name: PLR Devam
icon: resume
method: printer.gcode.script
params: {"script":"KOS_PLR_RESUME"}

[menu __main custom pid]
name: PID Kalibrasyon
icon: heat-up
method: printer.gcode.script
params: {"script":"KOS_PID_CALIBRATE"}
