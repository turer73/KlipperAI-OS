# =============================================================================
# KlipperOS-AI — FlowGuard Low-RAM Profile (Sensor-Only)
# =============================================================================
# Low-RAM profili icin optimize edilmis FlowGuard yapilandirmasi.
# AI Monitor DEVRE DISI — sadece donanim tabanli algilama.
#
# Aktif Katmanlar:
#   L1: Filament hareket sensoru (switch / motion sensor)
#   L3: TMC StallGuard (motor yuklenme algilama)
#
# Devre Disi Katmanlar:
#   L2: Heater duty cycle analizi (ai-monitor gerektirir)
#   L4: AI kamera analizi (ai-monitor + kamera gerektirir)
#
# Bu dosya STANDARD installer (dusuk RAM tespit edilince) tarafindan otomatik kopyalanir.
# =============================================================================

# =============================================================================
# L1: FILAMENT HAREKET SENSORU (BTT SFS / Encoder Tabanli)
# =============================================================================
# switch_pin degerini kendi kartiniza gore duzenleyin.
# pause_on_runout: True — Dusuk RAM modunda daemon yok, Klipper direkt duraklatir.
# =============================================================================

#[filament_motion_sensor btt_sfs]
#detection_length: 10
#extruder: extruder
#switch_pin: ^PG12          # DUZENLE: Kendi kartinizin pinine gore degistirin
#pause_on_runout: True       # Dusuk RAM: Direkt duraklatma (daemon yok)
#event_delay: 3.0
#runout_gcode: _KOS_FLOWGUARD_L1_TRIGGER
#insert_gcode: _KOS_FLOWGUARD_L1_INSERT

# Alternatif: Basit switch sensor (motion sensor yoksa)
#[filament_switch_sensor filament_switch]
#switch_pin: ^PA4            # DUZENLE: Kendi kartinizin pinine gore degistirin
#pause_on_runout: True
#runout_gcode: _KOS_FLOWGUARD_L1_TRIGGER
#insert_gcode: _KOS_FLOWGUARD_L1_INSERT

# =============================================================================
# L3: TMC STALLGUARD (Motor Yuklenme Algilama)
# =============================================================================
# TMC2209/2226 kullanan yazirilarda StallGuard II algilama.
# Extruder motoru tikandaginda (filament tikanma, hotend tikanma) otomatik
# duraklatma. CPU maliyeti: SIFIR (donanim kesmesi).
#
# KULLANIM: Asagidaki bolumu TMC surucu ayarlariniza gore duzenleyin.
# =============================================================================

#[tmc2209 extruder]
#uart_pin: PC11
#run_current: 0.650
#stealthchop_threshold: 999999
#driver_SGTHRS: 100          # StallGuard esik degeri (0-255)
                              # Dusuk = az hassas, yuksek = cok hassas
                              # Baslangic: 100, test ederek ayarlayin
#diag_pin: ^PA7              # DIAG pini — StallGuard tetikleme
                              # TMC2209 DIAG pinini kartiniza gore degistirin

# =============================================================================
# FLOWGUARD MAKROLARI
# =============================================================================

# --- L1 Sensor Tetikleme ---
[gcode_macro _KOS_FLOWGUARD_L1_TRIGGER]
description: FlowGuard L1 — Filament hareketi durdu
gcode:
    M117 FlowGuard: Filament hareketi yok!
    PAUSE
    {action_respond_info("FlowGuard L1: Filament hareketi tespit edilemedi — DURAKLATILDI")}

# --- L1 Sensor Insert ---
[gcode_macro _KOS_FLOWGUARD_L1_INSERT]
description: FlowGuard L1 — Filament hareketi algilandi
gcode:
    M117 FlowGuard: Filament OK
    {action_respond_info("FlowGuard L1: Filament hareketi algilandi")}

# --- FlowGuard Durum ---
[gcode_macro KOS_FLOWGUARD_STATUS]
description: FlowGuard sensor durumu (Low-RAM — L1+L3 only)
gcode:
    {action_respond_info("FlowGuard Profil: Low-RAM (Sensor-Only)")}
    {action_respond_info("L1 (Filament Sensor): Yapilandirilmis")}
    {action_respond_info("L2 (Heater Analiz):   DEVRE DISI")}
    {action_respond_info("L3 (TMC StallGuard):  Yapilandirilmis")}
    {action_respond_info("L4 (AI Kamera):       DEVRE DISI")}
    {% if "filament_motion_sensor btt_sfs" in printer %}
        {% set sensor = printer["filament_motion_sensor btt_sfs"] %}
        {action_respond_info("  L1 Durum: %s | Filament: %s" % ("AKTIF" if sensor.enabled else "DEVRE DISI", "EVET" if sensor.filament_detected else "HAYIR"))}
    {% elif "filament_switch_sensor filament_switch" in printer %}
        {% set sensor = printer["filament_switch_sensor filament_switch"] %}
        {action_respond_info("  L1 Durum: %s | Filament: %s" % ("AKTIF" if sensor.enabled else "DEVRE DISI", "EVET" if sensor.filament_detected else "HAYIR"))}
    {% else %}
        {action_respond_info("  L1: YAPILANDIRILMAMIS — sensor tanimlayiniz")}
    {% endif %}
