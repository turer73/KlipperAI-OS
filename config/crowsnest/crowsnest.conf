#### KlipperOS-AI — Crowsnest Camera Config
#### https://github.com/mainsail-crew/crowsnest

[crowsnest]
log_path: ~/printer_data/logs/crowsnest.log
log_level: verbose
delete_log: true
no_resolve: false

# --- Kamera 1 (Ana kamera) ---
[cam 1]
mode: ustreamer
enable_rtsp: false
port: 8080
device: /dev/video0
resolution: 640x480
max_fps: 15

# V4L2 kontrolleri (parlaklik, kontrast vb.)
# v4l2-ctl --list-ctrls ile mevcut kontrolleri goruntuleyin
v4l2ctl:

