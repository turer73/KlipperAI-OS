# =============================================================================
# KlipperOS-AI — Creality Ender 3 V2 Config
# =============================================================================
# Kart: Creality v4.2.7 (STM32F103)
# Yazici: Ender 3 V2
# Baski alani: 220x220x250mm
# =============================================================================

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# --- Stepper X (Creality 4.2.7 pinleri) ---
[stepper_x]
step_pin: PB9
dir_pin: PC2
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 50

# --- Stepper Y ---
[stepper_y]
step_pin: PB7
dir_pin: !PB8
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 50

# --- Stepper Z ---
[stepper_z]
step_pin: PB5
dir_pin: !PB6
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: ^PA7
position_endstop: 0.0
position_max: 250

# --- Extruder ---
[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PC3
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 260

# --- Heated Bed ---
[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

# --- Fanlar ---
[fan]
pin: PA0

[heater_fan hotend_fan]
pin: PC0

# --- Virtual SD Card ---
[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]

# --- Display (DWIN) ---
# Ender 3 V2 DWIN ekrani Klipper ile sinirli destek alir.
# KlipperScreen kullanmaniz onerilir.

# --- Macros ---
[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 Z10 F600
    G90

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL
gcode:
    TURN_OFF_HEATERS
    G91
    G1 Z5 F600
    G90
    G1 X0 Y220 F6000
    M84
    BASE_CANCEL
