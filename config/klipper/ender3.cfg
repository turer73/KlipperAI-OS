# --- KlipperOS-AI v2 Entegrasyon ---
[include klipper-macros/*.cfg]
[include kos_plr.cfg]
#[include kos_flowguard.cfg]   ; Filament sensoru varsa aktiflestiriniz
[include kos_rewind.cfg]
[include kos_bed_level.cfg]

[exclude_object]

[firmware_retraction]
retract_length: 0.8
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 40

[respond]

[gcode_macro KOS_PID_CALIBRATE]
description: Extruder ve bed PID otomatik kalibrasyon
gcode:
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {action_respond_info("PID kalibrasyonu basliyor...")}
    PID_CALIBRATE HEATER=extruder TARGET={EXTRUDER_TEMP}
    PID_CALIBRATE HEATER=heater_bed TARGET={BED_TEMP}
    SAVE_CONFIG

# --- Macros ---
[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 Z10 F600
    G90

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL
gcode:
    TURN_OFF_HEATERS
    G91
    G1 Z5 F600
    G90
    G1 X0 Y220 F6000
    M84
    BASE_CANCEL
