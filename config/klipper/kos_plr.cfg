# =============================================================================
# KlipperOS-AI — Power Loss Recovery (PLR) Macro System
# =============================================================================
# Elektrik kesintisi sonrasi baskilari kurtarmak icin katman-bazli
# durum kaydi ve geri yukleme makrolari.
#
# Gereksinimler:
#   - jschuh/klipper-macros (layers.cfg icindeki BEFORE_LAYER_CHANGE hook)
#   - [force_move] enable_force_move: True  (printer.cfg icinde tanimlanmali)
#   - [virtual_sdcard]                      (printer.cfg icinde tanimlanmali)
#   - [pause_resume]                        (printer.cfg icinde tanimlanmali)
#
# Kullanim:
#   Baski sirasinda her katman degisiminde durum otomatik kaydedilir.
#   Elektrik kesintisi sonrasi yazici acildiginda _KOS_CHECK_PLR otomatik
#   kontrol eder. Kayitli baski varsa KOS_PLR_RESUME ile devam edilir.
#   Iptal icin KOS_PLR_CLEAR kullanilir.
# =============================================================================

# -----------------------------------------------------------------------------
# Degisken dosyasi — PLR durumu burada saklanir
# -----------------------------------------------------------------------------
[save_variables]
filename: ~/printer_data/config/variables.cfg

# -----------------------------------------------------------------------------
# BEFORE_LAYER_CHANGE — jschuh/klipper-macros hook override
# Her katman degisiminde PLR durumunu kaydeder.
# rename_existing ile orijinal makro korunur.
# -----------------------------------------------------------------------------
[gcode_macro BEFORE_LAYER_CHANGE]
rename_existing: _KM_BEFORE_LAYER_CHANGE
gcode:
    {% set height = params.HEIGHT|default(0)|float %}
    {% set layer = params.LAYER|default(0)|int %}
    _KM_BEFORE_LAYER_CHANGE HEIGHT={height} LAYER={layer}
    _KOS_SAVE_PLR_STATE HEIGHT={height} LAYER={layer}

# -----------------------------------------------------------------------------
# _KOS_SAVE_PLR_STATE — Tum PLR degiskenlerini diske yazar
# Katman degisimlerinde BEFORE_LAYER_CHANGE tarafindan cagirilir.
# -----------------------------------------------------------------------------
[gcode_macro _KOS_SAVE_PLR_STATE]
gcode:
    {% set height = params.HEIGHT|default(0)|float %}
    {% set layer = params.LAYER|default(0)|int %}
    {% set file_pos = printer.virtual_sdcard.file_position %}
    {% set ext_temp = printer.extruder.target %}
    {% set bed_temp = printer.heater_bed.target %}
    {% set fan_spd = printer.fan.speed %}
    SAVE_VARIABLE VARIABLE=plr_active VALUE=True
    SAVE_VARIABLE VARIABLE=plr_file_position VALUE={file_pos}
    SAVE_VARIABLE VARIABLE=plr_z_height VALUE={height}
    SAVE_VARIABLE VARIABLE=plr_layer VALUE={layer}
    SAVE_VARIABLE VARIABLE=plr_extruder_temp VALUE={ext_temp}
    SAVE_VARIABLE VARIABLE=plr_bed_temp VALUE={bed_temp}
    SAVE_VARIABLE VARIABLE=plr_fan_speed VALUE={fan_spd}
    SAVE_VARIABLE VARIABLE=plr_timestamp VALUE=0

# -----------------------------------------------------------------------------
# _KOS_CHECK_PLR — Yazici acilisinda PLR durumunu kontrol eder
# 5 saniye gecikme ile calisir (yazicinin hazir olmasi icin).
# Kayitli baski varsa kullaniciya mesaj gosterir.
# -----------------------------------------------------------------------------
[delayed_gcode _KOS_CHECK_PLR]
initial_duration: 5
gcode:
    {% if printer.save_variables.variables.plr_active|default(False) %}
        M117 PLR: Kayitli baski var! kos-plr resume ile devam edin
        RESPOND MSG="PLR: Kayitli baski var! Devam icin KOS_PLR_RESUME, iptal icin KOS_PLR_CLEAR kullanin."
    {% endif %}

# -----------------------------------------------------------------------------
# KOS_PLR_RESUME — Kayitli baskiyi geri yukler
# Sicakliklari ayarlar, Z konumunu force_move ile belirler, XY home yapar,
# fan/hiz degerlerini geri yukler ve purge islemi yapar.
# ONEMLI: Z homing YAPILMAZ — nozul baskinin icine girebilir!
# -----------------------------------------------------------------------------
[gcode_macro KOS_PLR_RESUME]
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set ext_temp = svv.plr_extruder_temp|default(200)|float %}
    {% set bed_temp = svv.plr_bed_temp|default(60)|float %}
    {% set z_height = svv.plr_z_height|default(0)|float %}
    {% set fan_spd = svv.plr_fan_speed|default(0)|float %}
    # --- Sicakliklari baslat ---
    M104 S{ext_temp}
    M140 S{bed_temp}
    # --- Sicakliklara ulasilmasini bekle ---
    M109 S{ext_temp}
    M190 S{bed_temp}
    # --- Z konumunu force_move ile ayarla (home olmadan) ---
    SET_KINEMATIC_POSITION Z={z_height}
    # --- Nozulu 5mm yukari kaldir (carpismamasi icin) ---
    G91
    G1 Z5 F600
    G90
    # --- Sadece X ve Y home yap — Z ASLA HOME YAPILMAZ ---
    G28 X Y
    # --- Fan hizini geri yukle (0.0-1.0 araligini 0-255 araligina cevir) ---
    {% set fan_pwm = (fan_spd * 255)|int %}
    M106 S{fan_pwm}
    # --- Extruder sifirla ve purge yap ---
    G92 E0
    G1 E30 F300
    G1 E-2 F1500
    G92 E0
    # --- Kullaniciya bilgi ver ---
    RESPOND MSG="PLR resume hazir. RESUME komutu ile devam edin."

# -----------------------------------------------------------------------------
# KOS_PLR_CLEAR — PLR durumunu temizler
# Baski basariyla tamamlandiginda veya iptal edildiginde cagirilir.
# -----------------------------------------------------------------------------
[gcode_macro KOS_PLR_CLEAR]
gcode:
    SAVE_VARIABLE VARIABLE=plr_active VALUE=False

# -----------------------------------------------------------------------------
# PRINT_END — jschuh/klipper-macros override
# Baski tamamlandiginda once PLR durumunu temizler, sonra orijinal
# PRINT_END makrosunu calistirir.
# -----------------------------------------------------------------------------
[gcode_macro PRINT_END]
rename_existing: _KM_PRINT_END
gcode:
    KOS_PLR_CLEAR
    _KM_PRINT_END
