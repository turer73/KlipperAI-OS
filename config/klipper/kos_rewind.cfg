# =============================================================================
# KlipperOS-AI — Rewind Macro System
# =============================================================================
# Baski sirasinda geri sarma (rewind) islemi icin guvenli park, home ve
# hazirlama makrolari.
#
# Gereksinimler:
#   - [force_move] enable_force_move: True  (SET_KINEMATIC_POSITION icin zorunlu)
#
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# !!!  UYARI: Rewind islemi sirasinda Z HOMING ASLA YAPILMAMALIDIR!         !!!
# !!!  Yatak uzerinde baski varken Z home yapilirsa nozul baskiya carpar    !!!
# !!!  ve hem baskiyi hem de yaziciyi hasar gorebilir.                      !!!
# !!!  Sadece X ve Y home yapilir — Z eksen konumu korunur.                 !!!
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
#
# Kullanim:
#   1. KOS_REWIND_PARK    — Nozulu Z ekseninde guvenli yukari kaldirir
#   2. KOS_REWIND_HOME    — Sadece X/Y home yapar (Z ASLA home yapilmaz!)
#   3. KOS_REWIND_PREPARE — Sicakliklari ayarlar, purge yapar, baskiya hazirlar
# =============================================================================

# -----------------------------------------------------------------------------
# force_move — SET_KINEMATIC_POSITION icin zorunlu
# -----------------------------------------------------------------------------
[force_move]
enable_force_move: True

# -----------------------------------------------------------------------------
# KOS_REWIND_PARK — Nozulu Z ekseninde guvenli yukari kaldirir
# Parametreler:
#   Z_HOP : Yukari kaldirilacak mesafe (mm), varsayilan 10
# -----------------------------------------------------------------------------
[gcode_macro KOS_REWIND_PARK]
description: Rewind park — nozulu Z ekseninde guvenli yukari kaldirir
gcode:
    {% set z_hop = params.Z_HOP|default(10)|float %}
    G91
    G1 Z{z_hop} F600
    G90
    RESPOND MSG="Nozzle park edildi. Z +{z_hop}mm yukarida."

# -----------------------------------------------------------------------------
# KOS_REWIND_HOME — Sadece X ve Y eksenlerini home yapar
# KRITIK: Z homing ASLA YAPILMAZ — yatak uzerindeki baskiya carpar!
# -----------------------------------------------------------------------------
[gcode_macro KOS_REWIND_HOME]
description: Rewind home — sadece X/Y home yapar (Z ASLA home yapilmaz!)
gcode:
    G28 X Y
    RESPOND MSG="X/Y home tamamlandi (Z homing YAPILMADI — baski korumasi)"

# -----------------------------------------------------------------------------
# KOS_REWIND_PREPARE — Sicakliklari ayarlar, purge yapar, baskiya hazirlar
# Parametreler:
#   EXTRUDER_TEMP : Extruder sicakligi (C), varsayilan 210
#   BED_TEMP      : Yatak sicakligi (C), varsayilan 60
#   FAN_SPEED     : Fan hizi (0.0-1.0), varsayilan 0.0
#   PURGE_LENGTH  : Purge uzunlugu (mm), varsayilan 30
# -----------------------------------------------------------------------------
[gcode_macro KOS_REWIND_PREPARE]
description: Rewind hazirligi — sicaklik, fan ve purge ayarlari
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(210)|float %}
    {% set bed_temp = params.BED_TEMP|default(60)|float %}
    {% set fan_speed = params.FAN_SPEED|default(0.0)|float %}
    {% set purge_length = params.PURGE_LENGTH|default(30)|float %}
    # --- Sicakliklari baslat ---
    M104 S{extruder_temp}           ; set extruder
    M140 S{bed_temp}                ; set bed
    # --- Sicakliklara ulasilmasini bekle ---
    M109 S{extruder_temp}           ; wait extruder
    M190 S{bed_temp}                ; wait bed
    # --- Fan hizini ayarla (0.0-1.0 araligini 0-255 araligina cevir) ---
    M106 S{(fan_speed * 255)|int}   ; set fan
    # --- Purge islemi ---
    G92 E0
    G1 E{purge_length} F300         ; purge
    G1 E-2 F1800                    ; retract
    G92 E0
    RESPOND MSG="Rewind hazirligi tamamlandi. Extruder: {extruder_temp}C, Bed: {bed_temp}C, Purge: {purge_length}mm"
