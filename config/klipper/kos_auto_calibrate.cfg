# =============================================================================
# KlipperOS-AI — Auto Calibrate State Machine
# =============================================================================
# Tek komutla PID extruder + PID bed + Input Shaper + Bed Mesh
# kalibrasyonlarini sirayla calistirir.
#
# Her adim SAVE_CONFIG cagirdiginda firmware restart olur.
# delayed_gcode ile yazici acilisinda kaldigi adimdan devam eder.
# Durum bilgisi save_variables ile saklanir.
#
# Gereksinimler:
#   - [save_variables]  (kos_plr.cfg icinde tanimli)
#   - [respond]         (generic.cfg icinde tanimli)
#   - Opsiyonel: [adxl345] (Input Shaper icin ivmeolcer)
#   - Opsiyonel: [probe] veya [bltouch] (Bed Mesh icin)
#
# Kullanim:
#   KOS_AUTO_CALIBRATE                              ; Tum adimlar
#   KOS_AUTO_CALIBRATE EXTRUDER_TEMP=230 BED_TEMP=80
#   KOS_AUTO_CALIBRATE SKIP_PID=1                   ; PID atla
#   KOS_AUTO_CALIBRATE SKIP_SHAPER=1                ; Input Shaper atla
#   KOS_CAL_STATUS                                  ; Mevcut durum
#
# Adimlar:
#   1 — PID Extruder
#   2 — PID Bed
#   3 — Input Shaper (ivmeolcer varsa)
#   4 — Bed Mesh (probe varsa)
#   0 — Kalibrasyon yok / tamamlandi
# =============================================================================

# -----------------------------------------------------------------------------
# KOS_AUTO_CALIBRATE — Ana giris noktasi
# Parametreler:
#   EXTRUDER_TEMP : Extruder PID hedef sicakligi (varsayilan 210)
#   BED_TEMP      : Bed PID hedef sicakligi (varsayilan 60)
#   SKIP_PID      : 1 ise PID kalibrasyonunu atla (varsayilan 0)
#   SKIP_SHAPER   : 1 ise Input Shaper kalibrasyonunu atla (varsayilan 0)
# -----------------------------------------------------------------------------
[gcode_macro KOS_AUTO_CALIBRATE]
description: Tam otomatik kalibrasyon — PID + Shaper + Mesh sirayla
gcode:
    {% set extruder_temp = params.EXTRUDER_TEMP|default(210)|int %}
    {% set bed_temp = params.BED_TEMP|default(60)|int %}
    {% set skip_pid = params.SKIP_PID|default(0)|int %}
    {% set skip_shaper = params.SKIP_SHAPER|default(0)|int %}

    # Parametreleri kaydet (restart sonrasi erisim icin)
    SAVE_VARIABLE VARIABLE=kos_cal_extruder_temp VALUE={extruder_temp}
    SAVE_VARIABLE VARIABLE=kos_cal_bed_temp VALUE={bed_temp}
    SAVE_VARIABLE VARIABLE=kos_cal_skip_shaper VALUE={skip_shaper}

    {action_respond_info("KOS: Otomatik kalibrasyon basliyor...")}
    {action_respond_info("KOS: Extruder=%d, Bed=%d, PID_atla=%d, Shaper_atla=%d" % (extruder_temp, bed_temp, skip_pid, skip_shaper))}

    {% if skip_pid == 0 %}
        # Adim 1: PID Extruder
        SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=1
        {action_respond_info("KOS: [1/4] PID Extruder kalibrasyonu basliyor (%d°C)..." % extruder_temp)}
        PID_CALIBRATE HEATER=extruder TARGET={extruder_temp}
        SAVE_CONFIG
    {% else %}
        {action_respond_info("KOS: PID kalibrasyonu atlaniyor (SKIP_PID=1)")}
        # PID atlandiginda shaper veya mesh'e git
        {% if skip_shaper == 0 and printer.configfile.config["adxl345"] is defined %}
            SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=3
            {action_respond_info("KOS: [3/4] Input Shaper kalibrasyonu basliyor...")}
            SHAPER_CALIBRATE
            SAVE_CONFIG
        {% else %}
            # Shaper de atlaniyorsa veya ivmeolcer yoksa mesh'e git
            SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=4
            _KOS_CAL_BED_MESH
        {% endif %}
    {% endif %}

# -----------------------------------------------------------------------------
# _KOS_CAL_RESUME — Firmware restart sonrasi otomatik devam
# initial_duration: 8 saniye — yazicinin tamamen baslatilmasi icin beklenir
# save_variables'dan kos_cal_step okunur ve ilgili adimdan devam edilir.
# -----------------------------------------------------------------------------
[delayed_gcode _KOS_CAL_RESUME]
initial_duration: 8
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set plr_active = svv.plr_active|default(False) %}
    {% set step = svv.kos_cal_step|default(0)|int %}

    {% if plr_active and step > 0 %}
        {action_respond_info("KOS: PLR aktif — kalibrasyon sekansi ertelendi. Once KOS_PLR_RESUME veya KOS_PLR_CLEAR kullanin.")}
    {% elif step == 0 %}
        # Aktif kalibrasyon yok — hicbir sey yapma
    {% elif step == 1 %}
        # PID Extruder tamamlandi — PID Bed basla
        {% set bed_temp = svv.kos_cal_bed_temp|default(60)|int %}
        SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=2
        {action_respond_info("KOS: [2/4] PID Bed kalibrasyonu basliyor (%d°C)..." % bed_temp)}
        PID_CALIBRATE HEATER=heater_bed TARGET={bed_temp}
        SAVE_CONFIG
    {% elif step == 2 %}
        # PID Bed tamamlandi — Shaper veya Mesh
        {% set skip_shaper = svv.kos_cal_skip_shaper|default(0)|int %}
        {% if skip_shaper == 0 and printer.configfile.config["adxl345"] is defined %}
            SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=3
            {action_respond_info("KOS: [3/4] Input Shaper kalibrasyonu basliyor...")}
            SHAPER_CALIBRATE
            SAVE_CONFIG
        {% else %}
            {% if skip_shaper == 1 %}
                {action_respond_info("KOS: Input Shaper atlaniyor (SKIP_SHAPER=1)")}
            {% else %}
                {action_respond_info("KOS: Input Shaper atlaniyor (ivmeolcer bulunamadi)")}
            {% endif %}
            SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=4
            _KOS_CAL_BED_MESH
        {% endif %}
    {% elif step == 3 %}
        # Shaper tamamlandi — Bed Mesh basla
        SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=4
        _KOS_CAL_BED_MESH
    {% elif step == 4 %}
        # Bed Mesh tamamlandi — Kalibrasyon bitti
        _KOS_CAL_COMPLETE
    {% else %}
        {action_respond_info("KOS HATA: Bilinmeyen kalibrasyon adimi (%d). Sifirlaniyor..." % step)}
        SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=0
    {% endif %}

# -----------------------------------------------------------------------------
# _KOS_CAL_BED_MESH — Dahili yardimci: Bed Mesh kalibrasyonu
# Probe veya BLTouch tanimli ise mesh kalibrasyonu yapar.
# Tanimli degilse mesh adimini atlar ve kalibrasyonu tamamlar.
# -----------------------------------------------------------------------------
[gcode_macro _KOS_CAL_BED_MESH]
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set bed_temp = svv.kos_cal_bed_temp|default(60)|int %}

    {% if printer.configfile.config["probe"] is defined or printer.configfile.config["bltouch"] is defined %}
        {action_respond_info("KOS: [4/4] Bed Mesh kalibrasyonu basliyor...")}

        # Yatak isitma (sicaklik > 0 ise)
        {% if bed_temp > 0 %}
            {action_respond_info("KOS: Yatak %d°C'ye isitiliyor..." % bed_temp)}
            M190 S{bed_temp}
            G4 P60000  ; 60 saniye termal stabilizasyon
        {% endif %}

        G28  ; Home all
        BED_MESH_CALIBRATE PROFILE=default
        SAVE_CONFIG
    {% else %}
        {action_respond_info("KOS: Bed Mesh atlaniyor (probe/bltouch bulunamadi)")}
        _KOS_CAL_COMPLETE
    {% endif %}

# --- Tamamlama Alt Makro ---
[gcode_macro _KOS_CAL_COMPLETE]
description: Kalibrasyon sekansi tamamlama (dahili kullanim)
gcode:
    SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=0
    {action_respond_info("KOS: ============================================")}
    {action_respond_info("KOS: KALIBRASYON TAMAMLANDI!")}
    {action_respond_info("KOS: Tum adimlar basariyla tamamlandi.")}
    {action_respond_info("KOS: ============================================")}

# -----------------------------------------------------------------------------
# KOS_CAL_STATUS — Kalibrasyon durumunu gosterir
# Mevcut adimi okunabilir formatta kullaniciya bildirir.
# -----------------------------------------------------------------------------
[gcode_macro KOS_CAL_STATUS]
description: Otomatik kalibrasyon durumunu goster
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set step = svv.kos_cal_step|default(0)|int %}

    {% if step == 0 %}
        {action_respond_info("KOS Kalibrasyon: Aktif kalibrasyon yok")}
    {% elif step == 1 %}
        {action_respond_info("KOS Kalibrasyon: Adim 1/4 — PID Extruder tamamlandi, PID Bed bekleniyor")}
    {% elif step == 2 %}
        {action_respond_info("KOS Kalibrasyon: Adim 2/4 — PID Bed tamamlandi, Shaper/Mesh bekleniyor")}
    {% elif step == 3 %}
        {action_respond_info("KOS Kalibrasyon: Adim 3/4 — Input Shaper tamamlandi, Bed Mesh bekleniyor")}
    {% elif step == 4 %}
        {action_respond_info("KOS Kalibrasyon: Adim 4/4 — Bed Mesh isleniyor")}
    {% else %}
        {action_respond_info("KOS Kalibrasyon: Bilinmeyen adim (%d)" % step)}
    {% endif %}

# --- Kalibrasyon Iptal ---
[gcode_macro KOS_CAL_ABORT]
description: Otomatik kalibrasyon sekansini iptal et
gcode:
    SAVE_VARIABLE VARIABLE=kos_cal_step VALUE=0
    {action_respond_info("KOS: Kalibrasyon sekansi iptal edildi.")}
