# =============================================================================
# KlipperAI-OS — Image Build & Release Workflow
# =============================================================================
# Ubuntu Server 24.04 ISO'sunu yeniden paketleyerek bootable x86 kurulum
# ISO'su uretir ve GitHub Releases'da yayinlar.
#
# Yontem: Ubuntu Server ISO + autoinstall + KlipperOS-AI dosyalari
#
# Tetikleme:
#   - Manuel: Actions sekmesinden "Run workflow" ile
#   - Tag push: v* formatinda tag push edildiginde (ornek: v2.1.0)
# =============================================================================

name: Build KlipperAI-OS Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ornek: 2.1.0)'
        required: false
        default: ''
      create_release:
        description: 'GitHub Release olustur?'
        required: false
        type: boolean
        default: true

  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  IMAGE_BASE_NAME: klipperai-os-x86

jobs:
  build:
    name: Build ISO Image
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      # ----- Checkout -----
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----- Version belirleme -----
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep -oP '^VERSION="\K[^"]+' image-builder/build-image.sh || echo "2.1.0")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_BASE_NAME}-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Building KlipperAI-OS v${VERSION}"

      # ----- Bagimliliklari kur -----
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso \
            wget \
            p7zip-full \
            xz-utils

      # ----- Build script'te versiyonu guncelle -----
      - name: Update version in build script
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^VERSION=.*/VERSION=\"${VERSION}\"/" image-builder/build-image.sh

      # ----- Ubuntu Server ISO'sunu cache'le -----
      - name: Cache Ubuntu Server ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: image-builder/build/ubuntu-*.iso
          key: ubuntu-server-24.04.2-amd64

      # ----- Imaj olustur -----
      - name: Build ISO image
        run: |
          cd image-builder
          sudo -E bash build-image.sh
          # Build root olarak calisti — dosya izinlerini duzelt
          sudo chown -R runner:runner . || true
        env:
          DEBIAN_FRONTEND: noninteractive
          SKIP_SHA_CHECK: ${{ steps.cache-iso.outputs.cache-hit == 'true' && '1' || '0' }}

      # ----- Imaj bilgilerini topla -----
      - name: Collect image info
        id: image_info
        run: |
          IMAGE_NAME="${{ steps.version.outputs.image_name }}"

          # --- Sikistirilmis dosya (GitHub Release icin) ---
          COMPRESSED_PATH="image-builder/${IMAGE_NAME}.img.xz"
          if [ ! -f "$COMPRESSED_PATH" ]; then
            echo "::warning::Compressed file not found, trying to find and compress..."
            # Orijinal ISO/IMG dosyasini bul
            ORIG=""
            for ext in .img .iso; do
              if [ -f "image-builder/${IMAGE_NAME}${ext}" ]; then
                ORIG="image-builder/${IMAGE_NAME}${ext}"
                break
              fi
            done
            if [ -z "$ORIG" ]; then
              ORIG=$(find image-builder/ -maxdepth 1 \( -name "*.iso" -o -name "*.img" \) -not -name "*.sha256" -not -name "*.xz" 2>/dev/null | head -1)
            fi
            if [ -n "$ORIG" ]; then
              echo "::notice::Compressing ${ORIG}..."
              xz -z -T0 -3 -c "$ORIG" > "$COMPRESSED_PATH"
            else
              echo "::error::No image file found to compress!"
              ls -la image-builder/
              exit 1
            fi
          fi

          COMP_SIZE=$(du -h "$COMPRESSED_PATH" | cut -f1)
          COMP_SIZE_BYTES=$(stat --printf="%s" "$COMPRESSED_PATH")
          COMP_SHA256=$(sha256sum "$COMPRESSED_PATH" | cut -d' ' -f1)

          echo "compressed_path=${COMPRESSED_PATH}" >> "$GITHUB_OUTPUT"
          echo "compressed_size=${COMP_SIZE}" >> "$GITHUB_OUTPUT"
          echo "compressed_size_bytes=${COMP_SIZE_BYTES}" >> "$GITHUB_OUTPUT"
          echo "compressed_sha256=${COMP_SHA256}" >> "$GITHUB_OUTPUT"

          # SHA256 checksum dosyasi
          echo "${COMP_SHA256}  ${IMAGE_NAME}.img.xz" > "${COMPRESSED_PATH}.sha256"

          # --- Orijinal ISO bilgileri (sadece bilgi amacli) ---
          ORIG_PATH="image-builder/${IMAGE_NAME}.iso"
          if [ ! -f "$ORIG_PATH" ]; then
            ORIG_PATH="image-builder/${IMAGE_NAME}.img"
          fi
          if [ -f "$ORIG_PATH" ]; then
            ORIG_SIZE=$(du -h "$ORIG_PATH" | cut -f1)
            ORIG_SHA256=$(sha256sum "$ORIG_PATH" | cut -d' ' -f1)
            echo "original_size=${ORIG_SIZE}" >> "$GITHUB_OUTPUT"
            echo "original_sha256=${ORIG_SHA256}" >> "$GITHUB_OUTPUT"
          else
            echo "original_size=N/A" >> "$GITHUB_OUTPUT"
            echo "original_sha256=N/A" >> "$GITHUB_OUTPUT"
          fi

          echo "::notice::Compressed: ${COMP_SIZE} (${COMP_SIZE_BYTES} bytes), SHA256: ${COMP_SHA256}"

      # ----- Artifact olarak yukle (her zaman) -----
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.image_name }}
          path: |
            ${{ steps.image_info.outputs.compressed_path }}
            ${{ steps.image_info.outputs.compressed_path }}.sha256
          retention-days: 14
          compression-level: 0

      # ----- GitHub Release olustur -----
      - name: Create GitHub Release
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: KlipperAI-OS v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## KlipperAI-OS v${{ steps.version.outputs.version }}

            3D yazicilar icin Klipper + Moonraker + Mainsail + AI destekli komple isletim sistemi.
            Ubuntu Server 24.04 LTS tabanli.

            ### 📥 Indirme

            | Dosya | Boyut | SHA256 |
            |-------|-------|--------|
            | `${{ steps.version.outputs.image_name }}.img.xz` | ${{ steps.image_info.outputs.compressed_size }} | `${{ steps.image_info.outputs.compressed_sha256 }}` |

            > Orijinal ISO boyutu: ${{ steps.image_info.outputs.original_size }}

            ### 🔧 Kurulum

            **1. Dosyayi ac:**
            ```bash
            # Linux / macOS
            xz -d ${{ steps.version.outputs.image_name }}.img.xz

            # Windows: 7-Zip ile acin
            ```

            **2. USB'ye yaz:**
            ```bash
            # Linux / macOS
            sudo dd if=${{ steps.version.outputs.image_name }}.img of=/dev/sdX bs=4M status=progress

            # Windows: Balena Etcher veya Rufus kullanin
            ```

            **3. Ilk acilis:**
            1. USB'den boot edin
            2. Ubuntu autoinstall otomatik tamamlanir (~5 dk)
            3. Yeniden baslatma sonrasi First Boot Wizard baslar
            4. Donanim algilama → Profil secimi → Ag → Yazilim kurulumu
            5. Profiller: **LIGHT** (512MB RAM) | **STANDARD** (2GB+) | **FULL** (4GB+)

            ### 📦 Icerik
            - Klipper + Moonraker + Mainsail (web UI)
            - KlipperScreen (dokunmatik ekran)
            - Crowsnest (kamera streaming)
            - AI Print Monitor (yapay zeka baski izleme)
            - Input Shaping Assistant
            - FlowGuard filament sensoru
            - Otomatik donanim algilama ve profil onerisi

            ### ✅ Dogrulama
            ```bash
            sha256sum -c ${{ steps.version.outputs.image_name }}.img.xz.sha256
            ```
          files: |
            ${{ steps.image_info.outputs.compressed_path }}
            ${{ steps.image_info.outputs.compressed_path }}.sha256

      # ----- Build ozeti -----
      - name: Build summary
        if: always()
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.version.outputs.image_name }}.img.xz\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Method | Ubuntu Server 24.04 ISO repackaging |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.image_info.outputs.compressed_size }}" ]; then
            echo "| Compressed | ${{ steps.image_info.outputs.compressed_size }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Original | ${{ steps.image_info.outputs.original_size }} |" >> $GITHUB_STEP_SUMMARY
            echo "| SHA256 | \`${{ steps.image_info.outputs.compressed_sha256 }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | ${{ runner.os }} ${{ runner.arch }} |" >> $GITHUB_STEP_SUMMARY
