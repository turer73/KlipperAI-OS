# =============================================================================
# KlipperOS-AI — Creality Ender 3 Config
# =============================================================================
# Kart: Creality v4.2.2 (STM32F103)
# Yazici: Ender 3 / Ender 3 Pro
# Baski alani: 220x220x250mm
# =============================================================================

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
# Alternatif: serial: /dev/ttyUSB0

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# --- Stepper X (Creality 4.2.2 pinleri) ---
[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 50

# --- Stepper Y ---
[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 50

# --- Stepper Z ---
[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: ^PA7
position_endstop: 0.0
position_max: 250

# --- Extruder ---
[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 250

# --- Heated Bed ---
[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

# --- Fanlar ---
[fan]
pin: PA0

# --- Virtual SD Card ---
[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]

# --- Manuel Yatak Hizalama (4 vida) ---
[bed_screws]
screw1: 30.5, 37
screw1_name: Sol On
screw2: 30.5, 207
screw2_name: Sol Arka
screw3: 204.5, 207
screw3_name: Sag Arka
screw4: 204.5, 37
screw4_name: Sag On
horizontal_move_z: 5
speed: 50

# --- BLTouch (varsa yorumlari kaldirin) ---
#[bltouch]
#sensor_pin: ^PB1
#control_pin: PB0
#x_offset: -44
#y_offset: -6
