# =============================================================================
# KlipperOS-AI — Smart PRINT_START / PRINT_END Macros
# =============================================================================
# Dilimleyici (slicer) parametrelerini alarak akilli baski baslangic ve
# bitis islemleri yapar.
#
# PRINT_START:
#   1. Yatak isitma (non-blocking) + extruder on-isitma (150C)
#   2. G28 home all
#   3. Yatak sicaklik bekleme + termal soak
#   4. Mesh profil yukleme (filament+yuzey combo / adaptif / varsayilan)
#   5. KOS_BED_LEVEL_CHECK — mesh yas kontrol
#   6. Extruder hedef sicakliga isitma (homing sonrasi — ooze onleme)
#   7. Purge hatti
#
# _KOS_SMART_PRINT_END:
#   1. Retract + Z hop
#   2. Park pozisyonu (parca sunumu)
#   3. Isiticilar ve fan kapama
#   4. PLR temizleme
#   5. Step motorlar kapama
#
# Gereksinimler:
#   - [respond]                (generic.cfg icinde tanimli)
#   - kos_plr.cfg              (KOS_PLR_CLEAR icin)
#   - kos_bed_level.cfg        (KOS_BED_LEVEL_CHECK icin)
#
# Dilimleyici Yapilandirmasi (Slicer Configuration):
#
#   PrusaSlicer / SuperSlicer — Start G-code:
#     PRINT_START EXTRUDER_TEMP={first_layer_temperature[0]}
#       BED_TEMP={first_layer_bed_temperature[0]}
#       FILAMENT={filament_type[0]} SURFACE=pei
#
#   Cura — Start G-code:
#     PRINT_START EXTRUDER_TEMP={material_print_temperature_layer_0}
#       BED_TEMP={material_bed_temperature_layer_0}
#       FILAMENT=pla SURFACE=pei
#
#   OrcaSlicer — Start G-code:
#     PRINT_START EXTRUDER_TEMP=[nozzle_temperature_initial_layer]
#       BED_TEMP=[bed_temperature_initial_layer_single]
#       FILAMENT=[filament_type] SURFACE=pei
#
#   End G-code (tum dilimleyiciler):
#     PRINT_END
# =============================================================================

# -----------------------------------------------------------------------------
# PRINT_START — Akilli baski baslangic makrosu
# Dilimleyiciden gelen parametrelerle isitma, homing, mesh ve purge yapar.
# -----------------------------------------------------------------------------
[gcode_macro PRINT_START]
description: Akilli baski baslangic — isitma, homing, mesh, purge
gcode:
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set FILAMENT = params.FILAMENT|default("pla")|string|lower %}
    {% set SURFACE = params.SURFACE|default("pei")|string|lower %}
    {% set SOAK_TIME = params.SOAK_TIME|default(0)|int %}
    {% set PURGE_LENGTH = params.PURGE_LENGTH|default(60)|float %}
    {% set ADAPTIVE_MESH = params.ADAPTIVE_MESH|default(0)|int %}

    # --- 1. Yatak isitma (non-blocking) + extruder on-isitma ---
    {% set PREHEAT_TEMP = 150 %}
    {action_respond_info("KOS PRINT_START: Yatak %.0f°C, Extruder on-isitma %d°C" % (BED_TEMP, PREHEAT_TEMP))}
    M140 S{BED_TEMP}
    M104 S{PREHEAT_TEMP}

    # --- 2. Home all ---
    {action_respond_info("KOS PRINT_START: Homing basliyor...")}
    G28

    # --- 3. Yatak sicaklik bekleme + termal soak ---
    {action_respond_info("KOS PRINT_START: Yatak sicakligina ulasilmasi bekleniyor...")}
    M190 S{BED_TEMP}
    {% if SOAK_TIME > 0 %}
        {action_respond_info("KOS PRINT_START: Termal soak %d ms..." % SOAK_TIME)}
        G4 P{SOAK_TIME}
    {% endif %}

    # --- 4. Mesh profil yukleme ---
    {% set mesh_profiles = printer.bed_mesh.profiles|default({}) %}
    {% set combo_name = SURFACE ~ "_" ~ FILAMENT %}
    {% set has_probe = printer.configfile.config["probe"] is defined or printer.configfile.config["bltouch"] is defined %}
    {% if ADAPTIVE_MESH == 1 and has_probe %}
        {action_respond_info("KOS PRINT_START: Adaptif mesh kalibrasyon...")}
        BED_MESH_CALIBRATE ADAPTIVE=1
    {% elif combo_name in mesh_profiles %}
        {action_respond_info("KOS PRINT_START: Mesh profili yukleniyor: %s" % combo_name)}
        BED_MESH_PROFILE LOAD={combo_name}
    {% elif "default" in mesh_profiles %}
        {action_respond_info("KOS PRINT_START: Varsayilan mesh profili yukleniyor")}
        BED_MESH_PROFILE LOAD=default
    {% elif mesh_profiles|length > 0 %}
        {% set first_profile = mesh_profiles.keys()|list|first %}
        {action_respond_info("KOS PRINT_START: Ilk mevcut mesh yukleniyor: %s" % first_profile)}
        BED_MESH_PROFILE LOAD={first_profile}
    {% else %}
        {action_respond_info("KOS PRINT_START: Mesh profili bulunamadi — meshsiz devam ediliyor")}
    {% endif %}

    # --- 5. Bed mesh yas kontrol (adaptif mesh sonrasi atla — canli kalibrasyonu korur) ---
    {% if not (ADAPTIVE_MESH == 1 and has_probe) %}
        KOS_BED_LEVEL_CHECK
    {% endif %}

    # --- 6. Extruder hedef sicakliga isitma (homing sonrasi — ooze onleme) ---
    {action_respond_info("KOS PRINT_START: Extruder %.0f°C'ye isitiliyor..." % EXTRUDER_TEMP)}
    M109 S{EXTRUDER_TEMP}

    # --- 7. Purge hatti ---
    {% set max_x = printer.toolhead.axis_maximum.x|default(235)|float %}
    {% set safe_purge = [PURGE_LENGTH, max_x - 20]|min %}
    {action_respond_info("KOS PRINT_START: Purge hatti basliyor (%.0fmm)..." % safe_purge)}
    G92 E0
    G90
    G1 X5 Y5 Z0.3 F3000
    G1 X{safe_purge + 5} Y5 E{safe_purge / 4} F1500
    G1 X{safe_purge + 10} Y5 F3000
    G92 E0

    {action_respond_info("KOS PRINT_START: Baski basliyor!")}

# -----------------------------------------------------------------------------
# _KOS_SMART_PRINT_END — Akilli baski bitis makrosu
# Retract, Z hop, park, isitici/fan kapama, PLR temizleme, motor kapama.
# PRINT_END tarafindan cagirilir (kos_plr.cfg uzerinden).
# -----------------------------------------------------------------------------
[gcode_macro _KOS_SMART_PRINT_END]
description: Akilli baski bitis — retract, park, sogutma, temizlik
gcode:
    # --- 1. Retract ---
    G91
    G1 E-2 F1800

    # --- 2. Z hop (eksen limitlerine gore guvenli) ---
    {% set cur_z = printer.toolhead.position.z %}
    {% set max_z = printer.toolhead.axis_maximum.z|default(250)|float %}
    {% set z_safe = [cur_z + 10, max_z - 2]|min %}
    G90
    G1 Z{z_safe} F600

    # --- 3. Park pozisyonu (parca sunumu) ---
    {% set max_y = printer.toolhead.axis_maximum.y|default(220)|float %}
    G1 X0 Y{max_y - 5} F6000

    # --- 4. Isiticilar ve fan kapama ---
    TURN_OFF_HEATERS
    M107

    # --- 5. PLR temizleme ---
    KOS_PLR_CLEAR

    # NOT: M84 (stepper kapama) burada yapilmaz — _KM_PRINT_END zincirinde yapilir.
    # Bu makro _KM_PRINT_END'den once calisir, M84 hareketleri engellerdi.

    {action_respond_info("KOS PRINT_END: Baski tamamlandi!")}
