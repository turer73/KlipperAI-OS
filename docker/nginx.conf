# ═══════════════════════════════════════════════
# KlipperOS-AI — Nginx Reverse Proxy
# Tek port (80) uzerinden API + Dashboard
# ═══════════════════════════════════════════════

upstream api_backend {
    server kos-api:8470;
}

upstream dashboard {
    server kos-dashboard:3470;
}

server {
    listen 80;
    server_name _;

    # Gzip sikistirma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── API istekleri → FastAPI backend ───────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Uzun sureli AI islemleri icin timeout
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket → FastAPI backend ──────────
    location /api/v1/ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # 24 saat WS baglantisi
    }

    # ── Dashboard (Next.js) → varsayilan ─────
    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js HMR WebSocket (dev only) ─────
    location /_next/webpack-hmr {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static asset cache ───────────────────
    location /_next/static/ {
        proxy_pass http://dashboard;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
