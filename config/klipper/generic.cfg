# =============================================================================
# KlipperOS-AI — Generic Printer Config Template
# =============================================================================
# Genel amaçli Klipper yapilandirmasi.
# Bu template'i yazici kartiniza gore duzenleyin.
# =============================================================================

[mcu]
# MCU seri port — mcu-detect.sh ile tespit edin:
#   sudo /opt/klipperos-ai/scripts/mcu-detect.sh
serial: /dev/serial/by-id/usb-xxxx
# Alternatif: serial: /dev/ttyACM0

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# --- Stepper X ---
[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 235
homing_speed: 50

# --- Stepper Y ---
[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_max: 235
homing_speed: 50

# --- Stepper Z ---
[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: ^PC2
position_endstop: 0.0
position_max: 250

# --- Extruder ---
[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 250

# --- Heated Bed ---
[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC3
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

# --- Fan ---
[fan]
pin: PA8

# --- Virtual SD Card ---
[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]

# --- KlipperOS-AI v2 Entegrasyon ---
[include klipper-macros/*.cfg]
[include kos_plr.cfg]
#[include kos_flowguard.cfg]   ; Filament sensoru varsa aktiflestiriniz
[include kos_rewind.cfg]

[exclude_object]

[firmware_retraction]
retract_length: 0.8
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 40

[respond]

[gcode_macro KOS_PID_CALIBRATE]
description: Extruder ve bed PID otomatik kalibrasyon
gcode:
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {action_respond_info("PID kalibrasyonu basliyor...")}
    PID_CALIBRATE HEATER=extruder TARGET={EXTRUDER_TEMP}
    PID_CALIBRATE HEATER=heater_bed TARGET={BED_TEMP}
    SAVE_CONFIG

# --- Macros ---
[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 Z10 F600
    G90

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL
gcode:
    TURN_OFF_HEATERS
    G91
    G1 Z5 F600
    G90
    G1 X0 Y200 F6000
    M84
    BASE_CANCEL
