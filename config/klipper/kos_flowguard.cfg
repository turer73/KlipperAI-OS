# =============================================================================
# KlipperOS-AI — FlowGuard Filament Sensor Entegrasyon Katmani
# =============================================================================
# Bu dosya, FlowGuard 4-katmanli akis algilama sisteminin Klipper tarafindaki
# entegrasyon katmanini icerir (Layer 1 — fiziksel sensor).
#
# ONEMLI AYARLAR:
#   1. switch_pin degerini kendi yazici kartiniza gore duzenleyin.
#      Ornek: BTT Octopus -> ^PG12, SKR Mini E3 -> ^PC15
#   2. pause_on_runout: False OLMALIDIR. FlowGuard daemon'u duraklatma
#      islemini kendisi yonetir (L2-L4 katmanlari uzerinden). Klipper'in
#      kendi runout pause mekanizmasi devre disi birakilmalidir.
#   3. Asagidaki [filament_motion_sensor] bolumu VARSAYILAN olarak
#      yorum satirindadir. Donaniminiz varsa yorum isaretlerini (#)
#      kaldirarak etkinlestirin.
#
# FlowGuard 4-Katmanli Algilama Mimarisi:
#   L1: Fiziksel sensor (bu dosya — Klipper filament_motion_sensor)
#   L2: Extruder pressure/akis analizi (FlowGuard daemon)
#   L3: Heater duty cycle anomali tespiti (HeaterDutyAnalyzer)
#   L4: AI tabanli tahmin modeli (TFLite)
# =============================================================================

# =============================================================================
# FILAMENT HAREKET SENSORU (BTT SFS / Encoder Tabanli)
# =============================================================================
# Asagidaki bolumu etkinlestirmek icin her satirin basindaki # isaretini
# kaldirin. switch_pin degerini kendi kartiniza gore guncelleyin.
#
# NOT: pause_on_runout MUTLAKA False olmalidir — FlowGuard daemon'u
# duraklatma kararini 4 katmanli analiz sonucuna gore verir.
# =============================================================================

#[filament_motion_sensor btt_sfs]
#detection_length: 10
#extruder: extruder
#switch_pin: ^PG12          # DUZENLE: Kendi kartinizin pinine gore degistirin
#pause_on_runout: False      # FlowGuard daemon yonetir — True yapmayiniz!
#event_delay: 3.0
#runout_gcode: _KOS_FLOWGUARD_SENSOR_TRIGGER
#insert_gcode: _KOS_FLOWGUARD_SENSOR_INSERT

# =============================================================================
# FLOWGUARD MAKROLARI
# =============================================================================

# --- L1 Sensor Tetikleme: Filament hareketi durdu ---
[gcode_macro _KOS_FLOWGUARD_SENSOR_TRIGGER]
description: FlowGuard L1 — Filament hareket sensoru tetiklendi (runout/stall)
gcode:
    {action_respond_info("FlowGuard L1: Filament hareketi tespit edilemedi!")}

# --- L1 Sensor Insert: Filament hareketi algilandi ---
[gcode_macro _KOS_FLOWGUARD_SENSOR_INSERT]
description: FlowGuard L1 — Filament hareketi yeniden algilandi
gcode:
    {action_respond_info("FlowGuard L1: Filament hareketi algilandi")}

# --- FlowGuard Durum Raporu ---
[gcode_macro KOS_FLOWGUARD_STATUS]
description: FlowGuard sensor durumunu raporla
gcode:
    {% if "filament_motion_sensor btt_sfs" in printer %}
        {% set sensor = printer["filament_motion_sensor btt_sfs"] %}
        {% if sensor.enabled %}
            {action_respond_info("FlowGuard L1 Sensor: AKTIF | Filament algilandi: %s" % ("EVET" if sensor.filament_detected else "HAYIR"))}
        {% else %}
            {action_respond_info("FlowGuard L1 Sensor: DEVRE DISI (sensor disabled)")}
        {% endif %}
    {% else %}
        {action_respond_info("FlowGuard L1 Sensor: YAPILANDIRILMAMIS — kos_flowguard.cfg icinde [filament_motion_sensor btt_sfs] bolumunu etkinlestirin")}
    {% endif %}
