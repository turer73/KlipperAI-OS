# =============================================================================
# KlipperOS-AI — Voron 2.4 Config Template
# =============================================================================
# Kart: BTT Octopus / SKR 1.4 (STM32F446/LPC1768)
# Yazici: Voron 2.4 (CoreXY)
# Baski alani: 300x300x300mm (350mm versiyonu icin degistirin)
# =============================================================================

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_xxxx

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 10000
max_z_velocity: 15
max_z_accel: 350
square_corner_velocity: 5.0

# --- Stepper X (B Motor — sol arka) ---
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: PG6
position_min: 0
position_endstop: 300
position_max: 300
homing_speed: 100
homing_retract_dist: 5
homing_positive_dir: true

# --- Stepper Y (A Motor — sag arka) ---
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: PG9
position_min: 0
position_endstop: 305
position_max: 305
homing_speed: 100
homing_retract_dist: 5
homing_positive_dir: true

# --- Stepper Z (4x Z motor) ---
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: PG10
position_max: 290
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

# --- Extruder (Clockwork 2 / Stealthburner) ---
[extruder]
step_pin: PE2
dir_pin: PE3
enable_pin: !PD4
rotation_distance: 22.6789511
gear_ratio: 50:10
microsteps: 32
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA2
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF4
min_temp: 0
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
control: pid
pid_Kp: 26.213
pid_Ki: 1.304
pid_Kd: 131.721

# --- Heated Bed ---
[heater_bed]
heater_pin: PA1
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF3
max_power: 1.0
min_temp: 0
max_temp: 120
control: pid
pid_Kp: 38.771
pid_Ki: 1.746
pid_Kd: 215.177

# --- Fanlar ---
[fan]
pin: PA8
kick_start_time: 0.5
off_below: 0.10

[heater_fan hotend_fan]
pin: PE5
max_power: 1.0
fan_speed: 1.0
heater: extruder
heater_temp: 50.0

[controller_fan controller_fan]
pin: PD12
kick_start_time: 0.5
heater: heater_bed

# --- Probe ---
[probe]
pin: PG15
x_offset: 0
y_offset: 25.0
z_offset: 0
speed: 10.0
samples: 5
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.006
samples_tolerance_retries: 3

# --- Bed Mesh ---
[bed_mesh]
speed: 300
horizontal_move_z: 10
mesh_min: 40, 40
mesh_max: 260, 260
fade_start: 0.6
fade_end: 10.0
probe_count: 5, 5
algorithm: bicubic

# --- Z Tilt (Quad Gantry Level) ---
[quad_gantry_level]
gantry_corners:
    -60,-10
    360,370
points:
    50,25
    50,225
    250,225
    250,25
speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10

# --- Virtual SD Card ---
[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]

# --- Input Shaper ---
[input_shaper]
shaper_freq_x: 50
shaper_freq_y: 50
shaper_type: mzv

# --- KlipperOS-AI v2 Entegrasyon ---
[include klipper-macros/*.cfg]
[include kos_plr.cfg]
#[include kos_flowguard.cfg]   ; Filament sensoru varsa aktiflestiriniz
[include kos_rewind.cfg]

[exclude_object]

[firmware_retraction]
retract_length: 0.8
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 40

[respond]

[gcode_macro KOS_PID_CALIBRATE]
description: Extruder ve bed PID otomatik kalibrasyon
gcode:
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {action_respond_info("PID kalibrasyonu basliyor...")}
    PID_CALIBRATE HEATER=extruder TARGET={EXTRUDER_TEMP}
    PID_CALIBRATE HEATER=heater_bed TARGET={BED_TEMP}
    SAVE_CONFIG

# --- Macros ---
[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 Z10 F3000
    G90
    G1 X150 Y305 F6000

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL
gcode:
    TURN_OFF_HEATERS
    G91
    G1 Z5 F3000
    G90
    G1 X150 Y305 F6000
    M84
    BASE_CANCEL
