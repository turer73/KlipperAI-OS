# =============================================================================
# KlipperOS-AI — Nginx Config for Mainsail
# =============================================================================
# /etc/nginx/sites-available/mainsail
#
# AI Chat widget Mainsail icine sub_filter ile inject edilir.
# Widget: /ai-chat/static/widget.js (port 8085 uzerinden)

upstream apiserver {
    ip_hash;
    server 127.0.0.1:7125;
}

upstream aichat {
    server 127.0.0.1:8085;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    access_log /var/log/nginx/mainsail-access.log;
    error_log /var/log/nginx/mainsail-error.log;

    root /home/klipper/mainsail;
    index index.html;
    server_name _;

    # Buyuk dosya yukleme (G-code)
    client_max_body_size 0;
    proxy_request_buffering off;

    # =====================================================================
    # AI Chat Widget Injection
    # =====================================================================
    # Mainsail index.html icine widget script'ini inject et.
    # sub_filter gzip ile calismaz, bu yuzden Mainsail location'inda
    # Accept-Encoding'i kaldiriyoruz.

    # Mainsail static dosyalar — widget injection ile
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html — widget injection + gzip kapali (sub_filter icin sart)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        gzip off;

        # sub_filter: </body> oncesine widget script ekle
        sub_filter '</body>' '<script src="/ai-chat/static/widget.js" defer></script>\n</body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # =====================================================================
    # AI Chat Backend Proxy
    # =====================================================================
    # Widget JS ve API cagrilari icin AI chat servisine proxy
    location /ai-chat/ {
        proxy_pass http://aichat/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $scheme;

        # SSE (Server-Sent Events) icin gerekli
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # WebSocket proxy
    location /websocket {
        proxy_pass http://apiserver/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Moonraker API proxy
    location ~ ^/(printer|api|access|machine|server)/ {
        proxy_pass http://apiserver$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $scheme;
    }

    # Kamera snapshot proxy (opsiyonel)
    location /webcam/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
